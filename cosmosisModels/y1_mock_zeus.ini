[runtime]
; Zeus sampler - ensemble slice sampling
; Zeus is an alternative to emcee that can handle multi-modal posteriors better
sampler = zeus
root = ${COSMOSIS_SRC_DIR}

[test]
save_dir = /pscratch/sd/j/jesteves/winter2025/y3cpp/chains/y1_mock/test_zeus

[zeus]
; Zeus uses ensemble slice sampling, which can be more efficient than
; emcee's affine-invariant method for some problems.
; Number of walkers - must be at least 2*ndim + 1
; With 21 parameters: 2*21 + 1 = 43
walkers = 43
; Total number of samples to collect (increased for 21-param space)
samples = 100000
; Interval for convergence diagnostics (increased - convergence unknown)
nsteps = 1000
; Start from random positions within the prior
random_start = T
; Allow resuming from previous run
; To continue a chain that didn't converge: increase 'samples' and resubmit
; CosmoSIS will read the existing chain and continue from the last position
resume = T
; Optionally set tolerance for slice sampling
; tolerance = 0.05
; Optionally set the number of moves per step
; moves = 1

[DEFAULT]
; If something goes wrong this will aid diagnosis
fatal_errors = true

[output]
filename = ${PSCRATCH}/chains/winter2025/y3cpp/chains/zeus_full
format = text
lock = F
verbosity = debug

[pipeline]
modules = consistency camb mf_tinker halo_model sigmaCritInv numberCountsMock gammaCent shear likelihoods
values = ${PSCRATCH}/chains/winter2025/y3cpp/chains/values_full.ini
quiet = True
debug = False
timing = True

; The consistency module translates between our chosen parameterization
; and any other that modules in the pipeline may want (e.g. camb)
[consistency]
file = ${COSMOSIS_STANDARD_LIBRARY}/utility/consistency/consistency_interface.py

[camb]
file = ${COSMOSIS_STANDARD_LIBRARY}/boltzmann/camb/camb_interface.py
halofit_version = takahashi
feedback = 0
kmax = 50.0
kmin = 5e-3
lmax = 2500
mode = all
power_spectra = delta_tot delta_nonu
nk = 150
nonlinear = both
nz = 50
zmax = 1.0
zmin = 0.0
sigmar_rmin = 2.
sigmar_rmax = 70.
sigma_dr = 0.5

[mf_tinker]
file = ${COSMOSIS_STANDARD_LIBRARY}/mass_function/mf_tinker/tinker_mf_module.so
redshift_zero = 0
feedback = 0
matter_power_lin_version = 2

[sigma8_rescale]
file = ${COSMOSIS_STANDARD_LIBRARY}/utility/sample_sigma8/sigma8_rescale.py

[mstar]
file = ${COSMOSIS_STANDARD_LIBRARY}/boltzmann/sigma_cpp/sigma_cpp.py
matter_power = matter_power_nl
zmax = 1.1
zmin = 0.0
dz = 0.1
rmin = 0.01
rmax = 20.5
dr = 0.5

[halo_model]
file = ${Y3_CLUSTER_CPP_DIR}/y3_buzzard/buildWpGammat.py
R_perp_min = 0.05
R_perp_max = 10.
R_perp_bins = 128
Radii_min = 1.0
Radii_max = 35.
Radii_bins = 128
M_min = 1e12
M_max = 1e16
M_bins = 100
sigma_photoz = 0.01

[sigmaCritInv]
file = ${Y3_CLUSTER_CPP_DIR}/y3_buzzard/buildSigmaCritInv.py
beta_lut = ${Y3_CLUSTER_CPP_DIR}/data/beta_sigCrit_lut_mock_buzzard_zl.npz
is_delta_sigma = False

